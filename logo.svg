<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">

  <circle cx="100" cy="100" r="99" fill="#0d1526" stroke="#c0ccd8" stroke-width="7"/>
  <circle cx="100" cy="100" r="85" fill="none" stroke="#c0ccd8" stroke-width="1"/>
  <circle cx="100" cy="100" r="81" fill="none" stroke="#d4aa60" stroke-width="0.5"/>

  <defs>
    <path id="t1" d="M 18,100 A 82,82 0 0,1 182,100"/>
    <path id="t2" d="M 26,116 A 82,82 0 0,0 174,116"/>
  </defs>

  <text font-family="'Orbitron','Courier New',monospace" font-size="11" font-weight="700"
        letter-spacing="2" text-anchor="middle" fill="#c0ccd8">
    <textPath href="#t1" startOffset="50%">HIGH VALUE THINKING</textPath>
  </text>

  <text font-family="'Orbitron','Courier New',monospace" font-size="8.5" font-weight="600"
        letter-spacing="2.5" text-anchor="middle" fill="#d4aa60">
    <textPath href="#t2" startOffset="50%">THINK HIGHER</textPath>
  </text>

  <circle cx="19"  cy="100" r="2" fill="#d4aa60"/>
  <circle cx="181" cy="100" r="2" fill="#d4aa60"/>

  <g stroke="#c0ccd8" stroke-linecap="round" stroke-linejoin="round" fill="none">

    <!-- Descent stage outer frame -->
    <polygon points="100,42 120,42 132,52 132,74 120,84 100,84 80,84 68,74 68,52 80,42"
             stroke-width="1.8"/>
    <!-- X bracing on descent stage -->
    <line x1="80"  y1="42" x2="120" y2="84" stroke-width="1"/>
    <line x1="120" y1="42" x2="80"  y2="84" stroke-width="1"/>
    <!-- Horizontal mid bar -->
    <line x1="68"  y1="63" x2="132" y2="63" stroke-width="1.2"/>
    <!-- Vertical centre post -->
    <line x1="100" y1="42" x2="100" y2="84" stroke-width="1"/>

    <!-- Ascent stage body -->
    <rect x="81" y="22" width="38" height="22" rx="1.5" stroke-width="1.8"/>
    <!-- Ascent stage window -->
    <rect x="89" y="27" width="22" height="12" rx="1" stroke-width="1.2"/>
    <line x1="100" y1="27" x2="100" y2="39" stroke-width="0.8"/>
    <line x1="89"  y1="33" x2="111" y2="33" stroke-width="0.8"/>

    <!-- Antenna -->
    <line x1="100" y1="22" x2="100" y2="12" stroke-width="1.4"/>
    <line x1="100" y1="13" x2="94"  y2="10" stroke-width="0.9"/>
    <line x1="100" y1="13" x2="106" y2="10" stroke-width="0.9"/>
    <line x1="100" y1="13" x2="100" y2="9"  stroke-width="0.9"/>
    <circle cx="100" cy="8" r="2" stroke="#d4aa60" stroke-width="1.2"/>

    <!-- Left solar panel arm + frame -->
    <line x1="68" y1="63" x2="52" y2="63" stroke-width="1.2"/>
    <rect x="35" y="56" width="17" height="14" stroke-width="1.4"/>
    <line x1="41" y1="56" x2="41" y2="70" stroke-width="0.7"/>
    <line x1="47" y1="56" x2="47" y2="70" stroke-width="0.7"/>
    <line x1="35" y1="63" x2="52" y2="63" stroke-width="0.7"/>

    <!-- Right solar panel arm + frame -->
    <line x1="132" y1="63" x2="148" y2="63" stroke-width="1.2"/>
    <rect x="148" y="56" width="17" height="14" stroke-width="1.4"/>
    <line x1="154" y1="56" x2="154" y2="70" stroke-width="0.7"/>
    <line x1="160" y1="56" x2="160" y2="70" stroke-width="0.7"/>
    <line x1="148" y1="63" x2="165" y2="63" stroke-width="0.7"/>

    <!-- Left landing leg -->
    <line x1="77"  y1="84" x2="56"  y2="114" stroke-width="1.5"/>
    <line x1="88"  y1="84" x2="56"  y2="114" stroke-width="1"/>
    <line x1="46"  y1="114" x2="66" y2="114" stroke-width="2.2"/>
    <line x1="46"  y1="111" x2="46" y2="117" stroke-width="1"/>
    <line x1="66"  y1="111" x2="66" y2="117" stroke-width="1"/>

    <!-- Right landing leg -->
    <line x1="123" y1="84" x2="144" y2="114" stroke-width="1.5"/>
    <line x1="112" y1="84" x2="144" y2="114" stroke-width="1"/>
    <line x1="134" y1="114" x2="154" y2="114" stroke-width="2.2"/>
    <line x1="134" y1="111" x2="134" y2="117" stroke-width="1"/>
    <line x1="154" y1="111" x2="154" y2="117" stroke-width="1"/>

    <!-- Centre landing leg -->
    <line x1="100" y1="84" x2="100" y2="116" stroke-width="1.5"/>
    <line x1="92"  y1="84" x2="100" y2="116" stroke-width="1"/>
    <line x1="108" y1="84" x2="100" y2="116" stroke-width="1"/>
    <line x1="90"  y1="116" x2="110" y2="116" stroke-width="2.2"/>
    <line x1="90"  y1="113" x2="90"  y2="119" stroke-width="1"/>
    <line x1="110" y1="113" x2="110" y2="119" stroke-width="1"/>

    <!-- Descent engine nozzle -->
    <path d="M 94,84 L 91,96 L 109,96 L 106,84" stroke-width="1.2"/>
    <line x1="89" y1="96" x2="111" y2="96" stroke-width="1.8"/>

  </g>

  <!-- HVT wordmark -->
  <text x="100" y="150"
        font-family="'Orbitron','Courier New',monospace"
        font-size="23" font-weight="900"
        letter-spacing="4" text-anchor="middle"
        fill="#c0ccd8">HVT</text>

  <!-- Rule -->
  <line x1="54" y1="156" x2="146" y2="156" stroke="#d4aa60" stroke-width="0.8"/>

</svg>
