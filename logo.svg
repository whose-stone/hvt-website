<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <clipPath id="cx"><circle cx="100" cy="100" r="88"/></clipPath>
    <path id="ta" d="M 21,100 A 79,79 0 0,1 179,100"/>
    <path id="ba" d="M 30,122 A 79,79 0 0,0 170,122"/>
  </defs>

  <!-- Thick outer border -->
  <circle cx="100" cy="100" r="99" fill="#2a2a2a" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="100" cy="100" r="91" fill="#d8d8d8"/>
  <circle cx="100" cy="100" r="91" fill="none" stroke="#1a1a1a" stroke-width="16"/>

  <!-- Light grey inner field -->
  <circle cx="100" cy="100" r="83" fill="#d8d8d8"/>

  <!-- Sunburst rays — 3 grey shades, 18 rays -->
  <g clip-path="url(#cx)">
    <!-- Darkest rays -->
    <path d="M100,100 L100,12  L115,12  Z" fill="#aaaaaa"/>
    <path d="M100,100 L152,28  L165,42  Z" fill="#aaaaaa"/>
    <path d="M100,100 L168,80  L168,100 Z" fill="#aaaaaa"/>
    <path d="M100,100 L152,148 L138,162 Z" fill="#aaaaaa"/>
    <path d="M100,100 L48,148  L35,135  Z" fill="#aaaaaa"/>
    <path d="M100,100 L32,80   L32,60   Z" fill="#aaaaaa"/>

    <!-- Mid grey rays -->
    <path d="M100,100 L115,12  L138,18  Z" fill="#c0c0c0"/>
    <path d="M100,100 L165,42  L175,65  Z" fill="#c0c0c0"/>
    <path d="M100,100 L168,100 L165,120 Z" fill="#c0c0c0"/>
    <path d="M100,100 L138,162 L115,172 Z" fill="#c0c0c0"/>
    <path d="M100,100 L35,135  L25,112  Z" fill="#c0c0c0"/>
    <path d="M100,100 L32,60   L42,38   Z" fill="#c0c0c0"/>

    <!-- Lightest rays -->
    <path d="M100,100 L138,18  L152,28  Z" fill="#d0d0d0"/>
    <path d="M100,100 L175,65  L175,80  Z" fill="#d0d0d0"/>
    <path d="M100,100 L165,120 L152,148 Z" fill="#d0d0d0"/>
    <path d="M100,100 L115,172 L100,175 Z" fill="#d0d0d0"/>
    <path d="M100,100 L25,112  L25,88   Z" fill="#d0d0d0"/>
    <path d="M100,100 L42,38   L62,22   Z" fill="#d0d0d0"/>
  </g>

  <!-- LEM LINE ART — detailed schematic, clipped to circle -->
  <g clip-path="url(#cx)" stroke="#444444" stroke-linecap="round" stroke-linejoin="round" fill="none">

    <!-- Descent stage main octagon frame -->
    <polygon points="100,55 118,55 128,64 128,82 118,90 100,90 82,90 72,82 72,64 82,55"
             stroke-width="1.6"/>
    <!-- X cross-brace -->
    <line x1="82"  y1="55" x2="118" y2="90" stroke-width="1"/>
    <line x1="118" y1="55" x2="82"  y2="90" stroke-width="1"/>
    <!-- Horizontal mid bar -->
    <line x1="72"  y1="72" x2="128" y2="72" stroke-width="1.2"/>
    <!-- Vertical centre spine -->
    <line x1="100" y1="55" x2="100" y2="90" stroke-width="1"/>

    <!-- Ascent stage body -->
    <rect x="84" y="34" width="32" height="22" rx="1.5" stroke-width="1.6"/>
    <!-- Ascent stage window -->
    <rect x="90" y="39" width="20" height="12" rx="1" stroke-width="1.2"/>
    <line x1="100" y1="39" x2="100" y2="51" stroke-width="0.8"/>
    <line x1="90"  y1="45" x2="110" y2="45" stroke-width="0.8"/>
    <!-- Small circle detail on ascent stage -->
    <circle cx="100" cy="32" r="3" stroke-width="1"/>

    <!-- Antenna mast -->
    <line x1="100" y1="34" x2="100" y2="20" stroke-width="1.4"/>
    <!-- Antenna dish -->
    <circle cx="100" cy="17" r="4" stroke-width="1.2"/>
    <line x1="100" y1="17" x2="94"  y2="13" stroke-width="0.9"/>
    <line x1="100" y1="17" x2="106" y2="13" stroke-width="0.9"/>

    <!-- Left side arm to solar panel -->
    <line x1="72" y1="72" x2="55" y2="72" stroke-width="1.2"/>
    <!-- Left solar panel -->
    <rect x="38" y="64" width="17" height="16" stroke-width="1.4"/>
    <line x1="44"  y1="64" x2="44"  y2="80" stroke-width="0.7"/>
    <line x1="50"  y1="64" x2="50"  y2="80" stroke-width="0.7"/>
    <line x1="38"  y1="72" x2="55"  y2="72" stroke-width="0.7"/>

    <!-- Right side arm to solar panel -->
    <line x1="128" y1="72" x2="145" y2="72" stroke-width="1.2"/>
    <!-- Right solar panel -->
    <rect x="145" y="64" width="17" height="16" stroke-width="1.4"/>
    <line x1="151" y1="64" x2="151" y2="80" stroke-width="0.7"/>
    <line x1="157" y1="64" x2="157" y2="80" stroke-width="0.7"/>
    <line x1="145" y1="72" x2="162" y2="72" stroke-width="0.7"/>

    <!-- Left landing leg — outer strut + brace -->
    <line x1="82"  y1="90" x2="60"  y2="126" stroke-width="1.5"/>
    <line x1="92"  y1="90" x2="60"  y2="126" stroke-width="0.9"/>
    <!-- Left footpad -->
    <line x1="49"  y1="126" x2="72"  y2="126" stroke-width="2.4"/>
    <line x1="49"  y1="122" x2="49"  y2="130" stroke-width="1"/>
    <line x1="72"  y1="122" x2="72"  y2="130" stroke-width="1"/>

    <!-- Right landing leg -->
    <line x1="118" y1="90" x2="140" y2="126" stroke-width="1.5"/>
    <line x1="108" y1="90" x2="140" y2="126" stroke-width="0.9"/>
    <!-- Right footpad -->
    <line x1="128" y1="126" x2="151" y2="126" stroke-width="2.4"/>
    <line x1="128" y1="122" x2="128" y2="130" stroke-width="1"/>
    <line x1="151" y1="122" x2="151" y2="130" stroke-width="1"/>

    <!-- Centre landing leg -->
    <line x1="100" y1="90" x2="100" y2="128" stroke-width="1.5"/>
    <line x1="93"  y1="90" x2="100" y2="128" stroke-width="0.9"/>
    <line x1="107" y1="90" x2="100" y2="128" stroke-width="0.9"/>
    <!-- Centre footpad -->
    <line x1="90"  y1="128" x2="110" y2="128" stroke-width="2.4"/>
    <line x1="90"  y1="124" x2="90"  y2="132" stroke-width="1"/>
    <line x1="110" y1="124" x2="110" y2="132" stroke-width="1"/>

    <!-- Engine nozzle -->
    <path d="M 94,90 L 91,100 L 109,100 L 106,90" stroke-width="1.2"/>
    <line x1="88" y1="100" x2="112" y2="100" stroke-width="2"/>

    <!-- Moon surface / ground -->
    <path d="M 40,130 Q 55,125 65,128 Q 75,131 80,129 Q 90,126 100,128 Q 110,130 120,127 Q 132,124 145,128 Q 155,131 162,128"
          fill="none" stroke-width="1.2"/>
    <!-- Surface rocks -->
    <ellipse cx="55"  cy="131" rx="5" ry="2.5" stroke-width="0.9"/>
    <ellipse cx="145" cy="130" rx="4" ry="2"   stroke-width="0.9"/>
    <ellipse cx="80"  cy="132" rx="3" ry="1.5" stroke-width="0.9"/>

  </g>

  <!-- HVT — giant bold text overlaid on LEM, with white fill and dark outline -->
  <text x="100" y="98"
        font-family="'Arial Black','Impact','Orbitron',sans-serif"
        font-size="44" font-weight="900"
        letter-spacing="1" text-anchor="middle"
        stroke="#1a1a1a" stroke-width="5" paint-order="stroke"
        fill="white">HVT</text>

  <!-- THINK — top curved arc -->
  <text font-family="'Arial Black','Impact','Orbitron',sans-serif"
        font-size="15" font-weight="900"
        letter-spacing="6" text-anchor="middle"
        fill="#1a1a1a">
    <textPath href="#ta" startOffset="50%">THINK</textPath>
  </text>

  <!-- HIGHER — bottom curved arc -->
  <text font-family="'Arial Black','Impact','Orbitron',sans-serif"
        font-size="15" font-weight="900"
        letter-spacing="5" text-anchor="middle"
        fill="#1a1a1a">
    <textPath href="#ba" startOffset="50%">HIGHER</textPath>
  </text>

</svg>
