<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">

  <!-- Outer filled ring -->
  <circle cx="100" cy="100" r="99" fill="#0d1526"/>

  <!-- Thick border ring -->
  <circle cx="100" cy="100" r="99" fill="none" stroke="#c0ccd8" stroke-width="10"/>

  <!-- Inner border ring -->
  <circle cx="100" cy="100" r="84" fill="none" stroke="#c0ccd8" stroke-width="1.5"/>

  <!-- Curved top text path -->
  <defs>
    <path id="topRim" d="M 18,100 A 82,82 0 0,1 182,100"/>
    <path id="botRim" d="M 26,118 A 82,82 0 0,0 174,118"/>
  </defs>

  <!-- Top curved text: HIGH VALUE THINKING -->
  <text font-family="'Orbitron','Trebuchet MS',sans-serif"
        font-size="11.5" font-weight="700" letter-spacing="2.5"
        text-anchor="middle" fill="#c0ccd8">
    <textPath href="#topRim" startOffset="50%">HIGH VALUE THINKING</textPath>
  </text>

  <!-- Bottom curved text: EST. 2016 -->
  <text font-family="'Orbitron','Trebuchet MS',sans-serif"
        font-size="9" font-weight="600" letter-spacing="2"
        text-anchor="middle" fill="#d4aa60">
    <textPath href="#botRim" startOffset="50%">EST. 2016</textPath>
  </text>

  <!-- Dot separators on the horizontal -->
  <circle cx="27"  cy="100" r="2.5" fill="#d4aa60"/>
  <circle cx="173" cy="100" r="2.5" fill="#d4aa60"/>

  <!-- Simple lunar arc / crescent shape as central graphic -->
  <!-- Moon crescent -->
  <circle cx="100" cy="82" r="22" fill="#c0ccd8"/>
  <circle cx="110" cy="78" r="18" fill="#0d1526"/>

  <!-- Trajectory arc over the moon -->
  <path d="M 62,100 Q 100,52 138,100"
        fill="none" stroke="#d4aa60" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Small spacecraft dot on arc -->
  <circle cx="100" cy="61" r="3.5" fill="#d4aa60"/>

  <!-- HVT wordmark -->
  <text x="100" y="148"
        font-family="'Orbitron','Trebuchet MS',sans-serif"
        font-size="32" font-weight="900"
        letter-spacing="6" text-anchor="middle"
        fill="#c0ccd8">HVT</text>

  <!-- Thin rule under HVT -->
  <line x1="52" y1="155" x2="148" y2="155"
        stroke="#d4aa60" stroke-width="1.2"/>

</svg>
